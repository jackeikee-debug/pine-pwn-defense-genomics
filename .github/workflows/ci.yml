name: tests

on:
  push:
  pull_request:

jobs:
  reduced-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install pytest pyyaml pandas biopython
      - run: python -m pytest -q
      - run: >-
          python scripts/summarize_proteomes.py
          --input-dir examples/smoke/proteins
          --output examples/smoke/results/proteome_summary.tsv
      - run: diff -u examples/smoke/expected/proteome_summary.tsv examples/smoke/results/proteome_summary.tsv

